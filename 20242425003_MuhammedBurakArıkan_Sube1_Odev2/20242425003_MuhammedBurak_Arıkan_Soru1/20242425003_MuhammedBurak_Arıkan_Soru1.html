<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let bakiye = 1000; // başlangıç bakiyesi

      let islem = prompt(
        "İşlem seçiniz:\n1 - Bakiye Görüntüleme\n2 - Para Çekme\n3 - Para Yatırma"
      );

      switch (islem) {
        case "1":
          alert("Bakiyeniz: " + bakiye + " TL");
          break;

        case "2":
          let cekilecek = Number(prompt("Çekmek istediğiniz tutarı giriniz:"));

          if (cekilecek > bakiye) {
            alert("Yetersiz bakiye!");
          } else {
            bakiye -= cekilecek;
            alert("İşlem başarılı. Kalan bakiye: " + bakiye + " TL");
          }
          break;

        case "3":
          let yatirilacak = Number(
            prompt("Yatırmak istediğiniz tutarı giriniz:")
          );

          bakiye += yatirilacak;
          alert("İşlem başarılı. Yeni bakiye: " + bakiye + " TL");
          break;

        default:
          alert("Geçersiz işlem kodu seçtiniz.");
      }
    </script>
  </body>
</html>
